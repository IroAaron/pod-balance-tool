name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sprites live in the private game repo, not here — pull the current folder on every deploy so
      # balance-tool never falls behind when the game team adds/renames sprites. Sparse checkout keeps this
      # fast (skips the rest of the Godot project). Requires a SPRITE_REPO_TOKEN secret (fine-grained PAT,
      # KlukvaGames/preess-or-die, Contents: Read-only) — see README for setup.
      - name: Checkout sprite source repo
        uses: actions/checkout@v4
        with:
          repository: KlukvaGames/preess-or-die
          ref: gun2
          token: ${{ secrets.SPRITE_REPO_TOKEN }}
          path: sprite-source
          sparse-checkout: |
            roulette_interface/pod-mini characters
            roulette_interface/Icons_tags
            roulette_interface/Icons_tags_fields
          sparse-checkout-cone-mode: false

      - name: Sync sprites from game repo
        run: |
          rm -rf public/roulette_interface/pod-mini-characters
          mkdir -p public/roulette_interface/pod-mini-characters
          cp "sprite-source/roulette_interface/pod-mini characters/"*.png public/roulette_interface/pod-mini-characters/

      - name: Sync tag icons from game repo
        run: |
          rm -rf public/roulette_interface/icons-tags
          mkdir -p public/roulette_interface/icons-tags
          # This folder mixes .png and .svg — copy both, not just *.png.
          find "sprite-source/roulette_interface/Icons_tags/" -maxdepth 1 -type f \( -iname "*.png" -o -iname "*.svg" \) -exec cp {} public/roulette_interface/icons-tags/ \;

      # A separate folder from Icons_tags (found missing 2026-07-23) — small field/line/corner indicator icons
      # real descriptions reference via res://roulette_interface/Icons_tags_fields/... BBCode.
      - name: Sync field icons from game repo
        run: |
          rm -rf public/roulette_interface/icons-tags-fields
          mkdir -p public/roulette_interface/icons-tags-fields
          find "sprite-source/roulette_interface/Icons_tags_fields/" -maxdepth 1 -type f \( -iname "*.png" -o -iname "*.svg" \) -exec cp {} public/roulette_interface/icons-tags-fields/ \;

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Must match the EXPORT_TOKEN Script Property on the Apps Script project handling doPost —
          # see docs/apps-script-export.gs.
          VITE_SHEETS_EXPORT_TOKEN: ${{ secrets.VITE_SHEETS_EXPORT_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
